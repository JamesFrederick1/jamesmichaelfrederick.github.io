<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact</title>
        <link rel="icon" href="../files/logo.ico" type="image/x-icon">

        <link rel="stylesheet" href="/contact/contact.css" />

        <link rel="stylesheet" href="/shared/base.css">

        <link rel="stylesheet" href="/shared/auth.css">
        <link rel="stylesheet" href="/shared/banner-desktop.css">
        <link rel="stylesheet" href="/shared/banner-mobile.css" media="(max-width: 600px)">
        <script type="module" src="/shared/banner/banner.js"></script>
        
        <script type="module" src="/contact/contact.js"></script>
        
    </head>
    <body>
        <div id="bannerMount"></div>
        <section class="contact-section">

            <div id="contactGate" class="contact-gate liquid-glass">
                <h2>Requires sign in to contact</h2>
                <p>You must be signed in to send a message.</p>

                <button id="contactSigninBtn" class="gate-btn">
                    Sign in
                </button>
            </div>

            <div id="contactFormWrap">
                <!-- your existing contact form -->
                <div class="container">
                    <h1>Contact</h1>

                    <form>
                        <label>Name</label>
                        <input type="text">

                        <label>Email</label>
                        <input type="email">

                        <label>Message</label>
                        <textarea rows="5"></textarea>

                        <button class="submitbtn">Send</button>
                    </form>
                </div>
            </div>

        </section>
    </body>
</html>
