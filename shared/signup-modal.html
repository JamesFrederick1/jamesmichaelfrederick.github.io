<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="/shared/auth.css" />
    <script type="module" src="/shared/signUp.js"></script>
  </head>

  <body>
    <!-- Use openModal() so it always opens the same way as auto-open -->
    

    <!-- The Modal -->
    
      <div id="signupModal" class="modal" style="display:none;">
        <div class="modal-content animate">
          <div class="login-box">
            <h1>Sign up</h1>

            <span class="close" title="Close">&#10005;</span>

            <img src="/files/login.png" class="avatar" alt="Avatar" loading="eager" decoding="async" />

            <form class="login-form" action="#" method="post" autocomplete="off">
              <label class="email">
                <input
                  id="su_email"
                  type="email"
                  name="email"
                  placeholder="Enter an email"
                  spellcheck="false"
                  autocapitalize="off"
                  autocorrect="off"
                  autocomplete="email"
                  required
                />
              </label>

              <label class="username">
                <input
                  id="su_username"
                  type="text"
                  name="username"
                  placeholder="Enter a username"
                  spellcheck="false"
                  autocapitalize="off"
                  autocorrect="off"
                  required
                />
              </label>

              <label class="password-field">
                <input
                  id="su_password"
                  type="password"
                  name="password"
                  placeholder="Enter a password"
                  spellcheck="false"
                  autocorrect="off"
                  required
                />
                <img
                  id="su_togglePw"
                  class="eye-icon"
                  src="/files/eye.svg"
                  alt="Toggle password visibility"
                />
              </label>

              <label class="password-field">
                <input
                  id="su_confirmPassword"
                  type="password"
                  name="confirmPassword"
                  placeholder="Confirm password"
                  spellcheck="false"
                  autocorrect="off"
                  required
                />
              </label>

              <button type="button" id="su_signupBtn" class="loginbtn">Sign up</button>
              <p id="su_msg"></p>
            </form>

            <div id="su_successOverlay" class="success-overlay" style="display:none;">
              <div class="success-card">
                <p id="su_successMsg" class="success-text"></p>
                <button type="button" id="su_okBtn" class="loginbtn okbtn">OK</button>
              </div>
            </div>
          </div>
        </div>
      </div>
  </body>
</html>
